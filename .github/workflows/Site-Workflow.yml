name: Site CarrotCase
run-name: ${{ github.actor }} is deploying CarrotCase Site
on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "pom.xml"

jobs:

  build:
    name: Build and analyse
    runs-on: ubuntu-latest
    services:
      mysql_server:
        image: mysql:8.0
        env:
          MYSQL_URL: ${{ secrets.MYSQL_URL }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: codecase
        ports:
          - 3306:3306

      apiCodeCase:
        image: carotte98/carottecaseapi:latest
        env:
          MYSQL_URL: ${{ secrets.MYSQL_URL }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        ports:
          - 9002:9002

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Start MySQL
        run: sudo service mysql start

      - name: wait for MySql
        run: |
          while ! mysqladmin ping -h"127.0.0.1" -P"3306" --silent; do
            sleep 1
          done

      - name: Create DB from Script
        run: mysql -u${{ secrets.MYSQL_USER }} -p${{ secrets.MYSQL_PASSWORD }} < bdddumps/ScriptCreation.sql

      - name: wait for API
        run: |
          until curl -s -f http://127.0.0.1:9002; do
            sleep 2
          done

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=carotte98_carotteCase_Site

      - name: Charging artefact
        uses: actions/upload-artifact@v4
        with:
          name: CarotteCaseSite
          path: target/*.jar
          retention-days: 1

  Team_Notifications:
    name: MS Teams
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: jdcargile/ms-teams-notification@v1.4
        if: always()
        with:
          github-token: ${{ github.token }}
          ms-teams-webhook-uri: ${{ secrets.TEAMS_WEBHOOK_TOKEN }}
          notification-summary: Deployement finished !
          notification-color: 17a2b8
          timezone: Paris
          verbose-logging: true

  docker-build-image-api:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v5

      - name: Connect to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Download a single artifact
        uses: actions/download-artifact@v4
        with:
          name: CarotteCaseSite

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USER }}/carottecasesite:latest

      - run: echo "This job's status is ${{ job.status }}"

  Team_Notifications_Docker:
    name: MS Teams Docker
    runs-on: ubuntu-latest
    needs: docker-build-image-api
    steps:
      - uses: jdcargile/ms-teams-notification@v1.4
        if: always()
        with:
          github-token: ${{ github.token }}
          ms-teams-webhook-uri: ${{ secrets.TEAMS_WEBHOOK_TOKEN }}
          notification-summary: Push to Docker done !
          notification-color: 17a2b8
          timezone: Paris
          verbose-logging: true