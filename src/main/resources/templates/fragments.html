<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head th:fragment="htmlHead">
    <meta charset="UTF-8">
    <title>Code CASE</title>
    <link rel ="stylesheet" href="../static/css/style.css" data-th-href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>


<div th:fragment="headerContent">
    <header>
        <div id="header-container">
            <div id="logo-container">
                <img src="/images/logo-font-white.png" alt="logo Code CASE" class="logo">
            </div>
            <div id="signin-container">
                <span><a class="minbt-signin" data-action ="S'inscrire" href="/signup"></a></span>
                <span><a class="bt-connexion" data-action="Connexion" href="/login"></a></span>
            </div>
        </div>
    </header>
</div>

<div th:fragment="case(post)">
    <article>
        <div class ="article-header">
            <div class="info-container">
                <div class ="avatar-container">
                    <div class="avatar">
                        <img src="" alt="avatar">
                    </div>
                    <div class ="pseudo">
                        <span>pseudo</span>
                    </div>
                    <div class ="datePostCase">
                        <span th:text = "${post.dateCreation}">il y a 35 min</span>
                    </div>
                </div>
            </div>
            <div class ="tag-container">
                <span th:text ="${post.idCat}"</span>
            </div>
        </div>
        <div class ="article-title" th:text="${post.titrePost}"></div>
        <div class="article-description" th:text="${post.descriptionPost}"></div>
        <div class="article-container" th:text="${post.contenuPost}"></div>
        <div class="article-footer">
            <span><a class="bt-like" data-action ="like" href=""></a></span>
            <span><a class="bt-flag" data-action ="flag" href=""></a></span>
        </div>
    </article>
</div>

<div th:fragment="signupForm">
    <article>
        <div class ="article-header">
            <div class="info-container">
                <div class ="avatar-container">
                    <div class ="pseudo">
                        <span>Inscription</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="article-container">
            <form method="post" th:action="@{/createUser}" th:object="${user}">
                <div class="form-group">
                    <input type="text" th:field="*{emailUser}" placeholder="Email">
                </div>
                <div class="form-group">
                    <input type="text" th:field="*{pseudoUser}" placeholder="Pseudonyme">
                </div>
                <div class="form-group">
                    <input type="text" th:field="*{passwordUser}" placeholder="Mot de Passe">
                </div>
                <div class="form-group">
                    <input type="text" th:field="*{avatarUser}" placeholder="Avatar">
                </div>
                <button type="submit">Submit</button>
            </form>
        </div>
        <div class="article-footer">
            <span><a class="bt-valide" data-action ="flag" href="/signup"></a></span>
        </div>
    </article>
</div>

<div th:fragment="footer">
    <footer>
        <script src="../static/js/randompp.js"></script>
    </footer>
</div>

</body>
</html>
